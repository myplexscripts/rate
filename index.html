<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-touch-fullscreen" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Rate It</title>
<link rel="icon" type="image/png" href="images/icons/app-icon.png">
<link rel="apple-touch-icon" href="images/icons/app-icon.png">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
@font-face { font-family:'Circular'; src:url('https://dvdbsh.github.io/fonts/Circular/Circular-Book.ttf') format('truetype'); font-weight:400; font-display:swap; }
@font-face { font-family:'Circular'; src:url('https://dvdbsh.github.io/fonts/Circular/Circular-Medium.ttf') format('truetype'); font-weight:500; font-display:swap; }
@font-face { font-family:'Circular'; src:url('https://dvdbsh.github.io/fonts/Circular/Circular-Bold.ttf') format('truetype'); font-weight:700; font-display:swap; }
@font-face { font-family:'Circular'; src:url('https://dvdbsh.github.io/fonts/Circular/Circular-Black.ttf') format('truetype'); font-weight:900; font-display:swap; }

@property --glow-tl {
  syntax: '<color>';
  inherits: false;
  initial-value: rgba(40,40,60,1);
}
@property --glow-tr {
  syntax: '<color>';
  inherits: false;
  initial-value: rgba(40,40,60,1);
}
@property --glow-bl {
  syntax: '<color>';
  inherits: false;
  initial-value: rgba(40,40,60,1);
}
@property --glow-br {
  syntax: '<color>';
  inherits: false;
  initial-value: rgba(40,40,60,1);
}

:root {
  --bg: #000000;
  --text: #fffbf8;
  --muted: rgba(255,251,248,0.45);
  --star: #ebaf00;
  --star-off: rgba(255,251,248,0.22);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after {
  box-sizing:border-box; margin:0; padding:0;
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}

/* Visible keyboard-focus ring (WCAG 2.4.7 / Apple HIG focus states) —
   only shown for keyboard/AT users, not on pointer taps. */
button:focus-visible, [tabindex]:focus-visible, a:focus-visible {
  outline:2px solid var(--star);
  outline-offset:3px;
  border-radius:4px;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration:0.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.01ms !important;
    scroll-behavior:auto !important;
  }
}

html, body {
  width:100%; height:100%;
  overflow:hidden;
  position:fixed;
  background:var(--bg);
  color:var(--text);
  font-family:'Circular',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
  touch-action:manipulation;
}

img { -webkit-user-drag:none; user-drag:none; pointer-events:none; }

/* SKELETON SHIMMER */
@keyframes shimmer {
  0% { background-position:-468px 0; }
  100% { background-position:468px 0; }
}
.skeleton {
  background-color:rgba(255,251,248,0.06);
  background-image:linear-gradient(100deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.09) 50%, rgba(255,255,255,0) 70%);
  background-size:468px 100%;
  background-repeat:no-repeat;
  animation:shimmer 1.5s ease-in-out infinite;
}
.poster.skeleton {
  width:60vw;
  max-width:280px;
  aspect-ratio:2/3;
  height:auto;
}
#trailerSkeleton {
  width:100%;
  aspect-ratio:16/9;
  border-radius:14px;
}
.skel-text {
  display:inline-block;
  border-radius:5px;
  vertical-align:middle;
}

/* ULTRABLUR-STYLE GRADIENT BG — four corner blobs blended together,
   mirroring Plex's own "ultraBlurColors" artwork-derived backgrounds. */
#glowBg {
  position:fixed; inset:0;
  z-index:0;
  pointer-events:none;
  --glow-tl: rgba(40,40,60,1);
  --glow-tr: rgba(40,40,60,1);
  --glow-bl: rgba(40,40,60,1);
  --glow-br: rgba(40,40,60,1);
  background:
    radial-gradient(circle at 0% 0%,   var(--glow-tl) 0%, transparent 65%),
    radial-gradient(circle at 100% 0%, var(--glow-tr) 0%, transparent 65%),
    radial-gradient(circle at 0% 100%, var(--glow-bl) 0%, transparent 65%),
    radial-gradient(circle at 100% 100%, var(--glow-br) 0%, transparent 65%);
  -webkit-mask-image:linear-gradient(to bottom, #000 0%, #000 60%, transparent 100%);
  mask-image:linear-gradient(to bottom, #000 0%, #000 60%, transparent 100%);
  opacity:0.6;
  transition:--glow-tl 0.7s ease, --glow-tr 0.7s ease, --glow-bl 0.7s ease, --glow-br 0.7s ease;
}

/* STATES */
.state {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:12px; text-align:center;
  padding:48px 32px;
  background:var(--bg);
  z-index:200;
  opacity:0; pointer-events:none;
  transition:opacity 0.25s;
}
.state.on { opacity:1; pointer-events:all; }
.state-title { font-weight:900; font-size:1.35rem; letter-spacing:-0.02em; }
.state-sub { font-size:0.84rem; color:var(--muted); line-height:1.65; max-width:260px; }
.state-btn {
  margin-top:8px; padding:11px 26px;
  background:rgba(255,251,248,0.08);
  border:1px solid rgba(255,251,248,0.14);
  color:var(--text); border-radius:50px;
  font-family:'Circular',sans-serif;
  font-weight:600; font-size:0.85rem; cursor:pointer;
}
.state-btn.primary {
  background:var(--star);
  border-color:var(--star);
  color:#191919;
}
.spinner {
  width:30px; height:30px;
  border:2.5px solid rgba(255,251,248,0.1);
  border-top-color:var(--star);
  border-radius:50%;
  animation:spin 0.7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* STAGE */
#stage {
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  z-index:1;
  opacity:0; pointer-events:none;
  transition:opacity 0.25s;
}
#stage.on { opacity:1; pointer-events:all; }

/* CARD — vertically centred */
#card {
  position:relative; z-index:1;
  width:100%; height:100%;
  max-width:480px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:calc(var(--safe-top) + 20px) 24px calc(var(--safe-bottom) + 20px);
  gap:0;
}

/* POSTER STACK */
#posterStack {
  position:relative;
  width:100%;
  height:46vh;
  height:46svh;
  flex-shrink:1;
  min-height:0;
  margin-bottom:28px;
}
/* img sized to its own content (no letterbox box) so rounding shows on the real poster */
.poster {
  position:absolute;
  left:50%; top:50%;
  max-width:100%; max-height:100%;
  width:auto; height:auto;
  border-radius:18px;
  transform-origin:center center;
  transition:transform 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.38s ease, filter 0.38s ease;
  will-change:transform, opacity;
  box-shadow:0 18px 50px rgba(0,0,0,0.45);
}
.poster.p0 { z-index:3; transform:translate(-50%,-50%) scale(1); opacity:1; filter:none; }
.poster.p1 { z-index:2; transform:translate(-50%,-50%) scale(1); opacity:0; filter:none; }
.poster.p2 { z-index:1; transform:translate(-50%,-50%) scale(1); opacity:0; filter:none; }

/* INFO */
#info {
  width:100%; text-align:center;
  flex-shrink:0; margin-bottom:20px;
}
#iTitle {
  --fs: clamp(1.3rem,5vw,1.7rem);
  font-weight:900;
  font-size:var(--fs);
  letter-spacing:-0.025em; line-height:1.1;
  color:var(--text); margin-bottom:5px;
  /* Fixed 2-line box so titles of varying length never shift what's below —
     content sits at the bottom edge so a 1-line title doesn't leave a gap
     before the date. */
  display:flex;
  align-items:flex-end;
  justify-content:center;
  overflow:hidden;
  height:calc(var(--fs) * 1.1 * 2);
}
#iTitleText {
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
#iDate {
  font-size:0.75rem; font-weight:500;
  color:var(--muted); letter-spacing:0.01em;
  height:calc(0.75rem * 1.4);
  line-height:1.4;
}
#iSummary {
  margin-top:10px;
  font-size:0.78rem; font-weight:400;
  color:var(--muted); line-height:1.55;
  max-width:340px;
  margin-left:auto; margin-right:auto;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
  /* Fixed 3-line box so 1-line and 3-line summaries take identical space */
  height:calc(0.78rem * 1.55 * 3);
  cursor:pointer;
  transition:color 0.15s;
}
#iSummary:hover { color:var(--text); }
#iSummary:empty { cursor:default; }

/* SUMMARY POPUP */
#summaryOverlay {
  position:fixed;
  inset:0;
  z-index:500;
  display:flex; align-items:center; justify-content:center;
  padding:28px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(4px);
  opacity:0; pointer-events:none;
  transition:opacity 0.2s;
}
#summaryOverlay.on { opacity:1; pointer-events:all; }
#summaryBox {
  position:relative;
  width:100%; max-width:420px;
  max-height:70vh;
  overflow-y:auto;
  background:#222;
  border:1px solid rgba(255,251,248,0.1);
  border-radius:20px;
  padding:26px 24px 24px;
  transform:scale(0.94);
  transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  -webkit-overflow-scrolling:touch;
  touch-action:pan-y;
}
#summaryOverlay.on #summaryBox { transform:scale(1); }
#summaryBackdrop {
  display:none;
  position:relative;
  margin:-26px -24px 16px;
  height:160px;
  overflow:hidden;
  border-radius:20px 20px 0 0;
  opacity:0;
  transition:opacity 0.3s ease;
}
#summaryBackdrop.on { opacity:1; }
#summaryBackdrop img {
  width:100%; height:100%;
  object-fit:cover; display:block;
}
#summaryBackdrop::after {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(0,0,0,0.05) 35%, #222 100%);
}
#summaryBox.has-backdrop #summaryBackdrop { display:block; }
#summaryBox.has-backdrop #summaryTitle { padding-right:0; }
#summaryTitle {
  font-weight:900; font-size:1.2rem;
  letter-spacing:-0.02em; margin-bottom:12px;
  padding-right:36px;
  color:var(--text);
}
#summaryTitle img {
  display:block;
  max-width:60%;
  max-height:46px;
  object-fit:contain;
}
#summaryText {
  font-size:0.88rem; font-weight:400;
  line-height:1.65; color:rgba(255,251,248,0.75);
  min-height:2.9em;
}
#summaryGenres {
  display:flex; gap:8px; margin-top:16px;
}
#summaryGenres .genrePill {
  display:inline-flex; align-items:center;
  background:rgba(255,251,248,0.07);
  border:1px solid rgba(255,251,248,0.13);
  color:var(--text);
  border-radius:50px;
  padding:6px 14px;
  font-family:'Circular',sans-serif;
  font-size:0.7rem; font-weight:600;
  letter-spacing:0.01em;
}
#summaryGenres.hidden { display:none; }
#summaryYear {
  font-size:0.78rem; font-weight:600;
  color:rgba(255,251,248,0.5);
  margin-top:-8px; margin-bottom:12px;
}
#summaryCastWrap {
  position:relative;
  margin-top:18px;
}
#summaryCastWrap.hidden { display:none; }
#summaryCast {
  display:flex; gap:14px;
  overflow-x:auto;
  scrollbar-width:none;
  -ms-overflow-style:none;
}
#summaryCast::-webkit-scrollbar { display:none; }
#castFadeL, #castFadeR {
  position:absolute; top:0; bottom:0;
  width:28px; pointer-events:none;
  opacity:0; transition:opacity 0.2s ease;
  z-index:1;
}
#castFadeL {
  left:0;
  background:linear-gradient(to right, #222 0%, transparent 100%);
}
#castFadeR {
  right:0;
  background:linear-gradient(to left, #222 0%, transparent 100%);
}
#castFadeL.show, #castFadeR.show { opacity:1; }
#summaryCast .castMember {
  display:flex; flex-direction:column; align-items:center;
  width:64px; flex-shrink:0; text-align:center;
}
#summaryCast .castPhoto {
  width:56px; height:56px; border-radius:50%;
  object-fit:cover; background:rgba(255,251,248,0.1);
  border:1px solid rgba(255,251,248,0.13);
}
#summaryCast .castName {
  font-size:0.6875rem; font-weight:600;
  color:var(--text);
  margin-top:6px;
  line-height:1.25;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  overflow:hidden;
}
#summaryClose {
  /* Small controls like this read better as full circles than as
     near-square corners — concentricity math only pays off at larger sizes. */
  position:absolute; top:16px; right:16px;
  z-index:2;
  width:32px; height:32px;
  border:none; border-radius:50%;
  background:rgba(255,251,248,0.1);
  color:var(--text);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  transition:background 0.15s;
}
#summaryClose:hover { background:rgba(255,251,248,0.2); }
#summaryClose .icon { width:1.3rem; height:1.3rem; }

/* TRAILER */
#btnTrailer {
  display:inline-flex; align-items:center; gap:6px;
  margin:14px 0 18px;
  background:var(--star);
  border:none;
  color:#191919;
  border-radius:50px;
  padding:8px 18px 8px 13px;
  font-family:'Circular',sans-serif;
  font-size:0.75rem; font-weight:700;
  letter-spacing:0.01em;
  cursor:pointer;
  transition:background 0.15s, opacity 0.2s, transform 0.15s;
}
#btnTrailer .icon { width:1.15rem; height:1.15rem; }
#btnTrailer:active { transform:scale(0.96); }
#btnTrailer.hidden { display:none; }
#btnTrailer.skeleton {
  background-color:rgba(255,251,248,0.06);
  background-image:linear-gradient(100deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.09) 50%, rgba(255,255,255,0) 70%);
  background-size:468px 100%;
  animation:shimmer 1.5s ease-in-out infinite;
  color:transparent;
  pointer-events:none;
  width:104px; height:34px;
}

#trailerInline { margin:14px 0 18px; }
#trailerInline.hidden { display:none; }
#trailerVideo {
  width:100%;
  aspect-ratio:16/9;
  border-radius:14px;
  background:#000;
  display:block;
}
#trailerError {
  width:100%;
  aspect-ratio:16/9;
  border-radius:14px;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  color:var(--muted);
  font-size:0.875rem;
}
#trailerError .icon { width:1.3rem; height:1.3rem; }
#trailerVideo.hidden, #trailerError.hidden, #trailerSkeleton.hidden { display:none; }

/* STARS */
#starRow {
  display:flex; align-items:center; justify-content:center;
  gap:4px; flex-shrink:0;
  margin-bottom:24px;
  touch-action:none; cursor:pointer;
}
/* Inline SVG icons (sprite-based) — fill follows the element's CSS `color`,
   so they behave exactly like the font-icons they replace. */
.icon {
  width:1em; height:1em;
  display:inline-block;
  vertical-align:-0.15em;
  fill:currentColor;
  flex-shrink:0;
}
.star {
  font-size:2.5rem; line-height:1;
  color:var(--star-off);
  transition:color 0.12s, transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
}
.star.lit { color:var(--star); transform:scale(1.15); }

/* ACTIONS */
#actions {
  display:flex; align-items:center;
  justify-content:space-between;
  width:100%; flex-shrink:0;
  padding:0 16px;
}
.act-btn {
  background:none; border:none;
  cursor:pointer; color:var(--muted);
  display:flex; align-items:center; justify-content:center;
  padding:10px; border-radius:50%;
  transition:color 0.15s, transform 0.12s;
  -webkit-tap-highlight-color:transparent;
}
.act-btn .icon { width:2rem; height:2rem; }
.act-btn:hover  { color:var(--text); }
.act-btn:active { transform:scale(0.9); color:var(--text); }
.act-btn:disabled { opacity:0.2; pointer-events:none; }
.act-btn.active { color:#f74366; }
.act-btn.active:hover { color:#f74366; }

/* TOAST — pinned to the top, clear of all centred UI & the progress ring */
#toast {
  position:fixed;
  left:50%;
  transform:translateX(-50%) translateY(-6px);
  max-width:min(calc(100vw - 100px), 320px);
  background:rgba(255,251,248,0.06);
  border:1px solid rgba(255,251,248,0.1);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  color:var(--text);
  padding:9px 20px; border-radius:50px;
  font-size:0.78rem; font-weight:600;
  text-align:center;
  opacity:0; pointer-events:none;
  transition:opacity 0.2s, transform 0.2s;
  z-index:400;
}
#toast.on { opacity:1; transform:translateX(-50%) translateY(0); }

/* PROGRESS RING — subtle indicator of items left */
#ratedCounter {
  position:fixed;
  top:calc(var(--safe-top) + 16px);
  left:18px;
  z-index:60;
  display:flex; align-items:center; gap:6px;
  font-size:0.8rem; font-weight:700;
  color:var(--text);
  opacity:0.55;
  letter-spacing:0.01em;
}
#ratedCounter .icon {
  width:15px; height:15px;
  color:var(--star);
}
#ratedCounter, #progress { cursor:pointer; }

.counterTip {
  position:fixed;
  z-index:70;
  max-width:180px;
  padding:8px 12px;
  border-radius:10px;
  background:rgba(28,28,32,0.92);
  border:1px solid rgba(255,251,248,0.12);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  color:var(--text);
  font-size:0.74rem; font-weight:600; line-height:1.4;
  letter-spacing:0.005em;
  text-align:left;
  box-shadow:0 8px 24px rgba(0,0,0,0.35);
  opacity:0; transform:translateY(-4px) scale(0.96);
  transition:opacity 0.18s ease, transform 0.18s ease;
  pointer-events:none;
}
.counterTip.on { opacity:1; transform:translateY(0) scale(1); }
#progress {
  position:fixed;
  top:calc(var(--safe-top) + 16px);
  right:18px;
  width:36px; height:36px;
  z-index:60;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition:opacity 0.25s;
}
#progress.on { opacity:0.55; pointer-events:all; }
#progress svg {
  position:absolute; inset:0;
  width:100%; height:100%;
  transform:rotate(-90deg);
}
#progress circle {
  fill:none;
  stroke-width:2.5;
}
#progress .ring-track { stroke:rgba(255,251,248,0.14); }
#progress .ring-bar {
  stroke:var(--text);
  stroke-linecap:round;
  transition:stroke-dashoffset 0.4s ease;
}
#progressCount {
  position:relative;
  font-size:0.6875rem;
  font-weight:700;
  letter-spacing:-0.02em;
  color:var(--text);
}

/* TYPE FILTER — sits beneath the progress ring, top-right corner */
#typeFilter {
  position:fixed;
  top:calc(var(--safe-top) + 16px + 36px + 12px);
  right:11px;
  z-index:60;
  display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:4px;
  background:rgba(255,251,248,0.06);
  border:1px solid rgba(255,251,248,0.1);
  border-radius:14px;
  opacity:0; pointer-events:none;
  transition:opacity 0.25s;
}
#typeFilter.on { opacity:0.55; pointer-events:all; }
#typeFilter.on:hover { opacity:1; }
.filter-btn {
  /* ~44px hit target per Apple HIG / WCAG 2.5.5 minimum tap-target guidance */
  width:40px; height:40px;
  display:flex; align-items:center; justify-content:center;
  background:none; border:none;
  /* outer radius (14) − container padding (4) keeps the corners concentric */
  border-radius:10px;
  color:var(--muted);
  cursor:pointer;
  transition:background 0.15s, color 0.15s, transform 0.12s;
  -webkit-tap-highlight-color:transparent;
}
.filter-btn .icon { width:1.15rem; height:1.15rem; }
.filter-btn:active { transform:scale(0.9); }
.filter-btn.active { background:var(--star); color:#191919; }
#toast.celebrate {
  background:var(--star);
  color:#191919;
  border-color:var(--star);
  font-weight:900;
  font-size:0.92rem;
  padding:12px 26px;
  box-shadow:0 8px 30px rgba(235,175,0,0.4);
}
</style>
</head>

<svg style="display:none" aria-hidden="true">

<script>
const PLEX_PRODUCT = 'Rate It';
const STORE_TOKEN = 'rateit_token';
const STORE_URL   = 'rateit_url';
const STORE_CLIENT= 'rateit_clientId';

function getClientId() {
  let id = localStorage.getItem(STORE_CLIENT);
  if (!id) {
    id = (crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    }));
    localStorage.setItem(STORE_CLIENT, id);
  }
  return id;
}
const clientId = getClientId();

const cfg = { url: localStorage.getItem(STORE_URL) || '', token: localStorage.getItem(STORE_TOKEN) || '' };

let queue = [];
let hist  = [];
let allItems = [];
let chronological = [];
let shuffled = false;
// Always starts unfiltered — the user opts into a movies/TV-only view each session.
let typeFilter = 'all';
let rating = 0;
let ratingTimer = null;
let busy = false;
let ratedCount = 0;   // RATED items only (not skips)

function updateRatedCounter() {
  document.getElementById('ratedCounterNum').textContent = ratedCount;
}

// Brief explanatory bubble for the rated/remaining counters — appears near
// the tapped element, then fades itself out after a moment.
let counterTipTimer = null;
function showCounterTip(anchor, text) {
  let tip = document.getElementById('counterTip');
  if (!tip) {
    tip = document.createElement('div');
    tip.id = 'counterTip';
    tip.className = 'counterTip';
    tip.setAttribute('role', 'tooltip');
    document.body.appendChild(tip);
  }
  clearTimeout(counterTipTimer);
  tip.textContent = text;
  tip.classList.remove('on');

  const r = anchor.getBoundingClientRect();
  const onLeft = r.left < window.innerWidth / 2;
  tip.style.top = (r.bottom + 8) + 'px';
  if (onLeft) {
    tip.style.left = r.left + 'px';
    tip.style.right = 'auto';
  } else {
    tip.style.right = (window.innerWidth - r.right) + 'px';
    tip.style.left = 'auto';
  }

  requestAnimationFrame(() => tip.classList.add('on'));
  counterTipTimer = setTimeout(() => tip.classList.remove('on'), 1800);
}

const escHtml = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const H = () => ({ 'X-Plex-Token': cfg.token, 'Accept': 'application/json' });
const plexHeaders = () => ({
  'Accept': 'application/json',
  'X-Plex-Product': PLEX_PRODUCT,
  'X-Plex-Client-Identifier': clientId
});
const posterUrl = it => {
  const k = it && (it.thumb || it.art);
  if (!k) return '';
  const w = isMeteredConnection() ? 480 : 800;
  return `${cfg.url}${k}?X-Plex-Token=${cfg.token}&width=${w}`;
};

async function plexGet(path) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 20000);
  try {
    const r = await fetch(cfg.url + path, { headers: H(), signal: ctrl.signal });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  } catch (e) {
    if (e.name === 'AbortError') throw new Error('Request timed out');
    throw e;
  } finally {
    clearTimeout(timer);
  }
}

// ── Plex OAuth sign-in ────────────────────────────────────
function signOut() {
  localStorage.removeItem(STORE_TOKEN);
  localStorage.removeItem(STORE_URL);
  cfg.token = '';
  cfg.url = '';
  hideStage();
  setState('auth');
}

async function signIn() {
  const btn = document.getElementById('btnSignIn');
  btn.disabled = true;
  btn.textContent = 'Waiting for Plex…';
  try {
    const pinResp = await fetch('https://plex.tv/api/v2/pins?strong=true', {
      method: 'POST',
      headers: plexHeaders()
    });
    if (!pinResp.ok) throw new Error('Could not start sign-in');
    const pin = await pinResp.json();

    const authParams = new URLSearchParams({
      clientID: clientId,
      code: pin.code,
      'context[device][product]': PLEX_PRODUCT
    });
    const authWindow = window.open(`https://app.plex.tv/auth#?${authParams.toString()}`, '_blank');

    const token = await pollForToken(pin.id);
    if (authWindow && !authWindow.closed) authWindow.close();
    if (!token) throw new Error('Sign-in timed out');

    cfg.token = token;
    localStorage.setItem(STORE_TOKEN, token);

    setState('load');
    document.getElementById('loadTitle').textContent = 'Connecting';
    document.getElementById('loadSub').textContent = 'Locating your Plex server…';

    const url = await discoverServer(token);
    if (!url) throw new Error('No Plex server found on your account');

    cfg.url = url;
    localStorage.setItem(STORE_URL, url);

    document.getElementById('loadTitle').textContent = 'Loading';
    document.getElementById('loadSub').textContent = 'Fetching your watched, unrated library from Plex.';
    loadItems();
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Sign in with Plex';
    setState('auth');
    toast(e.message || 'Sign-in failed');
  }
}

function pollForToken(pinId) {
  return new Promise((resolve, reject) => {
    const start = Date.now();
    const timeoutMs = 3 * 60 * 1000;
    const tick = async () => {
      if (Date.now() - start > timeoutMs) return resolve(null);
      try {
        const r = await fetch(`https://plex.tv/api/v2/pins/${pinId}`, {
          headers: plexHeaders()
        });
        if (r.ok) {
          const data = await r.json();
          if (data.authToken) return resolve(data.authToken);
        }
      } catch {}
      setTimeout(tick, 2000);
    };
    tick();
  });
}

// Fetch with a hard timeout — unreachable hosts/relays can otherwise hang
// the request indefinitely, stalling the "Connecting…" screen forever.
function fetchWithTimeout(url, opts, ms) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { ...opts, signal: ctrl.signal })
    .catch(e => { throw (e.name === 'AbortError' ? new Error('Request timed out') : e); })
    .finally(() => clearTimeout(timer));
}

async function discoverServer(token) {
  const r = await fetchWithTimeout('https://plex.tv/api/v2/resources?includeHttps=1&includeRelay=1', {
    headers: { ...plexHeaders(), 'X-Plex-Token': token }
  }, 15000);
  if (!r.ok) return null;
  const resources = await r.json();
  const servers = (resources || []).filter(d => (d.provides || '').split(',').includes('server'));

  for (const server of servers) {
    const conns = [...(server.connections || [])].sort((a, b) => {
      const score = c => (c.local ? 2 : 0) + (c.relay ? -1 : 0);
      return score(b) - score(a);
    });
    for (const conn of conns) {
      const base = conn.uri;
      try {
        const test = await fetchWithTimeout(`${base}/identity`, {
          headers: { 'X-Plex-Token': token, 'Accept': 'application/json' }
        }, 6000);
        if (test.ok) return base;
      } catch {}
    }
  }
  return null;
}

async function loadItems() {
  setState('load');
  hideStage();
  hist = [];
  ratedCount = 0;
  updateRatedCounter();
  try {
    const sd = await plexGet('/library/sections');
    const libs = (sd.MediaContainer.Directory || []).filter(d => d.type === 'movie' || d.type === 'show');
    const seen = new Set();
    let all = [];
    for (const lib of libs) {
      const t = lib.type === 'movie' ? 1 : 2;
      // Movies: only ones that have been watched (checked client-side below
      // via viewCount, since not all PMS versions accept the same filter
      // operator syntax server-side — better to fetch everything and be sure).
      // Shows: fetch all, then require >50% of episodes watched.
      const d = await plexGet(`/library/sections/${lib.key}/all?type=${t}&sort=lastViewedAt%3Adesc&X-Plex-Container-Size=10000&X-Plex-Container-Start=0`);
      for (const m of (d.MediaContainer.Metadata || [])) {
        if (m.userRating || seen.has(m.ratingKey)) continue;
        if (t === 1) {
          if (!(m.viewCount > 0)) continue;
        } else {
          const total = m.leafCount || 0;
          const watched = m.viewedLeafCount || 0;
          if (!total || watched / total <= 0.5) continue;
        }
        seen.add(m.ratingKey);
        all.push({ ...m, libType: lib.type });
      }
    }
    all.sort((a, b) => (b.lastViewedAt || 0) - (a.lastViewedAt || 0));
    allItems = all;
    updateFilterButtons();
    rebuildQueueFromFilter();
    if (!queue.length) {
      document.getElementById('doneSub').textContent = typeFilter === 'movie'
        ? 'No unrated watched movies.'
        : typeFilter === 'show'
          ? 'No unrated watched TV shows.'
          : 'No more unrated watched items.';
      setState('done');
      return;
    }
    rebuild();
    showStage();
  } catch(e) {
    setState('err');
    document.getElementById('errMsg').textContent = e.message || 'Connection failed.';
  }
}

// ── Type filter (movies / TV shows) ───────────────────────
function rebuildQueueFromFilter() {
  chronological = (typeFilter === 'all')
    ? allItems.slice()
    : allItems.filter(it => it.libType === typeFilter);
  queue = chronological.slice();
  shuffled = false;
  const shuffleBtn = document.getElementById('btnShuffle');
  shuffleBtn.classList.remove('active');
  shuffleBtn.setAttribute('aria-pressed', 'false');
}

function updateFilterButtons() {
  const movieBtn = document.getElementById('filterMovie');
  const showBtn  = document.getElementById('filterShow');
  movieBtn.classList.toggle('active', typeFilter === 'movie');
  movieBtn.setAttribute('aria-pressed', String(typeFilter === 'movie'));
  showBtn.classList.toggle('active', typeFilter === 'show');
  showBtn.setAttribute('aria-pressed', String(typeFilter === 'show'));
}

function setTypeFilter(type) {
  if (busy) return;
  typeFilter = (typeFilter === type) ? 'all' : type;
  updateFilterButtons();
  clearTimeout(ratingTimer);
  hist = [];
  ratedCount = 0;
  updateRatedCounter();
  rebuildQueueFromFilter();
  if (!queue.length) {
    hideStage();
    document.getElementById('doneSub').textContent = typeFilter === 'movie'
      ? 'No unrated watched movies.'
      : typeFilter === 'show'
        ? 'No unrated watched TV shows.'
        : 'No more unrated watched items.';
    setState('done');
    updateProgress();
    return;
  }
  hideStage();
  rebuild();
  showStage();
  updateProgress();
  toast(typeFilter === 'all' ? 'Showing movies & TV' : (typeFilter === 'movie' ? 'Movies only' : 'TV shows only'));
}

// ── Full rebuild (initial & back) ─────────────────────────
function rebuild() {
  const item = queue[0];
  if (!item) return;
  const stack = document.getElementById('posterStack');
  stack.innerHTML = '';
  const top3 = queue.slice(0, 3);
  for (let i = top3.length - 1; i >= 0; i--) {
    const img = document.createElement('img');
    img.className = 'poster p' + i + ' skeleton';
    img.alt = top3[i].title || '';
    stack.appendChild(img);
    loadPoster(top3[i], img, i === 0);
  }
  setInfo(item);
  resetRating();
  document.getElementById('btnBack').disabled = hist.length === 0;
  updateProgress();
  preloadAhead();
}

let infoItem = null;

function setInfo(item) {
  infoItem = item;
  document.getElementById('iTitleText').textContent = item.title || '';
  document.getElementById('iDate').textContent = item.lastViewedAt
    ? 'Watched ' + fmtDate(item.lastViewedAt * 1000) : '';
  document.getElementById('iSummary').textContent = item.summary || '';
  preloadInfo();
}

// ── Trailer ───────────────────────────────────────────────
async function loadTrailer(item) {
  if (item._trailer !== undefined) return item._trailer;
  try {
    const d = await plexGet(`/library/metadata/${item.ratingKey}/extras`);
    const extras = (d.MediaContainer.Metadata || []);
    const clip = extras.find(e => e.subtype === 'trailer');
    const part = clip && clip.Media && clip.Media[0] && clip.Media[0].Part && clip.Media[0].Part[0];
    item._trailer = part ? { url: `${cfg.url}${part.key}${part.key.includes('?') ? '&' : '?'}X-Plex-Token=${cfg.token}` } : null;
  } catch (e) {
    console.warn('[trailer] lookup failed', e);
    item._trailer = null;
  }
  return item._trailer;
}

// Reveals the trailer player inline inside the summary popup (no nested popup).
function playInlineTrailer() {
  const item = queue[0];
  if (!item || !item._trailer) return;
  const btn = document.getElementById('btnTrailer');
  const wrap = document.getElementById('trailerInline');
  const video = document.getElementById('trailerVideo');
  const errEl = document.getElementById('trailerError');
  const skel = document.getElementById('trailerSkeleton');
  btn.classList.add('hidden');
  wrap.classList.remove('hidden');
  errEl.classList.add('hidden');
  video.classList.add('hidden');
  skel.classList.remove('hidden');
  video.onerror = () => { skel.classList.add('hidden'); video.classList.add('hidden'); errEl.classList.remove('hidden'); };
  video.onloadeddata = () => { skel.classList.add('hidden'); errEl.classList.add('hidden'); video.classList.remove('hidden'); };
  video.src = item._trailer.url;
  video.play().catch(err => console.warn('[trailer] play() rejected', err));
}
// Stop + tear down the inline player (called when the summary popup closes).
function stopInlineTrailer() {
  const wrap = document.getElementById('trailerInline');
  const video = document.getElementById('trailerVideo');
  const skel = document.getElementById('trailerSkeleton');
  wrap.classList.add('hidden');
  skel.classList.add('hidden');
  video.pause();
  video.removeAttribute('src');
  video.onerror = null;
  video.onloadeddata = null;
  video.load();
}

// Inline SVG placeholders shown when posters / cast photos fail to load.
const PLACEHOLDER_POSTER = 'data:image/svg+xml;utf8,' + encodeURIComponent(
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450">
    <rect width="300" height="450" fill="#262626"/>
    <rect x="95" y="155" width="110" height="80" rx="8" fill="none" stroke="#555" stroke-width="6"/>
    <circle cx="125" cy="180" r="9" fill="#555"/>
    <path d="M100 225 L140 190 L165 210 L200 175 L200 225 Z" fill="#555"/>
  </svg>`);
const PLACEHOLDER_CAST = 'data:image/svg+xml;utf8,' + encodeURIComponent(
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#262626"/>
    <circle cx="50" cy="38" r="18" fill="#555"/>
    <path d="M20 92 Q50 62 80 92 Z" fill="#555"/>
  </svg>`);

// Cache loaded poster blob URLs + extracted glow colours by ratingKey so
// revisiting an item (e.g. via Back or Shuffle) shows it instantly instead
// of re-fetching — and never appears to "lose" the previous poster.
const posterCache = new Map();

async function loadPoster(item, img, isTop) {
  const key = item.ratingKey;
  const cached = posterCache.get(key);
  if (cached) {
    img._glow = cached.glow;
    img.src = cached.url;
    img.classList.remove('skeleton');
    if (isTop) setGlow(cached.glow);
    return;
  }
  const url = posterUrl(item);
  const ultraBlur = getUltraBlurColors(item);
  img.onerror = () => { img.onerror = null; img.classList.remove('skeleton'); img.src = PLACEHOLDER_POSTER; };
  try {
    const resp = await fetch(url, { headers: H() });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const blob = await resp.blob();
    const obj = URL.createObjectURL(blob);
    img.onload = async () => {
      img.classList.remove('skeleton');
      // Prefer Plex's own ultraBlurColors (server-extracted, matches its UI);
      // fall back to sampling pixels ourselves if the metadata lacks it.
      const c = ultraBlur || await getEdgeColors(img);
      img._glow = c;
      posterCache.set(key, { url: obj, glow: c });
      if (isTop) setGlow(c);
    };
    img.src = obj;
  } catch {
    img.classList.remove('skeleton');
    img.src = PLACEHOLDER_POSTER;
  }
}

// On cellular (or when the user has Data Saver on), background prefetching
// of posters/cast photos/backdrops just competes with what's on screen for
// limited bandwidth — so we scale it back instead of firing it all eagerly.
function isMeteredConnection() {
  const c = navigator.connection || navigator.webkitConnection || navigator.mozConnection;
  if (!c) return false;
  if (c.saveData) return true;
  return /^(slow-2g|2g|3g)$/.test(c.effectiveType || '');
}

function preloadAhead() {
  if (isMeteredConnection()) return;
  for (let i = 3; i <= 4; i++) {
    const item = queue[i];
    if (item) { const im = new Image(); im.src = posterUrl(item); }
  }
}

// Quietly warm the summary-popup data (extra info + trailer lookup + cast
// photos) for the current item plus the next couple of titles, so it's
// already cached by the time the user opens the popup. queue[0] is included
// because the very first title shown has no "previous" item to have preloaded
// it. queue[1]/queue[2] are "up next" regardless of chronological vs shuffled
// order, since shuffle simply reorders the queue itself.
// On metered connections we only warm queue[0] (the item the user is looking
// at right now) and skip the cast-photo downloads — those only matter once
// the summary popup is actually opened, where loadExtraInfo() is re-run and
// covers them anyway.
function preloadInfo() {
  const metered = isMeteredConnection();
  const upper = metered ? 0 : 2;
  for (let i = 0; i <= upper; i++) {
    const item = queue[i];
    if (!item) continue;
    loadExtraInfo(item).then(extra => {
      if (metered) return;
      extra.cast.forEach(c => { if (c.photo) prefetchCastPhoto(c.photo); });
    });
    loadTrailer(item);
  }
}

// ── Colour extraction ─────────────────────────────────────
// Samples the dominant colour from the left 30% and right 30% of the
// poster so the page glow can blend the two, mirroring the artwork.
function getEdgeColors(imgEl) {
  return new Promise(resolve => {
    try {
      const W = 100, H = 80;
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(imgEl, 0, 0, W, H);
      const data = ctx.getImageData(0, 0, W, H).data;
      const edge = Math.round(W * 0.3);

      const dominant = (xMin, xMax) => {
        let best = null, bestScore = -1;
        for (let y = 0; y < H; y++) {
          for (let x = xMin; x < xMax; x++) {
            const i = (y * W + x) * 4;
            const r = data[i], g = data[i+1], b = data[i+2];
            const max = Math.max(r,g,b), min = Math.min(r,g,b);
            const brightness = max / 255;
            const sat = max === 0 ? 0 : (max - min) / max;
            if (brightness < 0.12 || brightness > 0.95 || sat < 0.2) continue;
            const score = sat * (1 - Math.abs(brightness - 0.55));
            if (score > bestScore) { bestScore = score; best = [r, g, b]; }
          }
        }
        return best || [40, 40, 60];
      };

      const left = dominant(0, edge), right = dominant(W - edge, W);
      resolve({ tl: left, bl: left, tr: right, br: right });
    } catch {
      const c = [40, 40, 60];
      resolve({ tl: c, bl: c, tr: c, br: c });
    }
  });
}

// Plex tags most artwork with "ultraBlurColors" — four corner colours
// (already extracted server-side) that its own apps use for ambient
// backgrounds. Prefer that real metadata over guessing from pixels.
function hexToRgb(hex) {
  if (!hex) return null;
  const h = hex.replace('#', '');
  if (h.length !== 6) return null;
  const n = parseInt(h, 16);
  if (Number.isNaN(n)) return null;
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

function getUltraBlurColors(item) {
  const ub = item.ultraBlurColors || item.UltraBlurColors;
  if (!ub) return null;
  const tl = hexToRgb(ub.topLeft), tr = hexToRgb(ub.topRight);
  const bl = hexToRgb(ub.bottomLeft), br = hexToRgb(ub.bottomRight);
  if (!tl || !tr || !bl || !br) return null;
  return { tl, tr, bl, br };
}

function setGlow({ tl, tr, bl, br }) {
  const bg = document.getElementById('glowBg');
  bg.style.setProperty('--glow-tl', `rgb(${tl[0]},${tl[1]},${tl[2]})`);
  bg.style.setProperty('--glow-tr', `rgb(${tr[0]},${tr[1]},${tr[2]})`);
  bg.style.setProperty('--glow-bl', `rgb(${bl[0]},${bl[1]},${bl[2]})`);
  bg.style.setProperty('--glow-br', `rgb(${br[0]},${br[1]},${br[2]})`);
}

// ── Stars ─────────────────────────────────────────────────
(function buildStars() {
  const row = document.getElementById('starRow');
  for (let n = 1; n <= 5; n++) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    el.setAttribute('class', 'icon star');
    el.dataset.n = n;
    const use = document.createElementNS('http://www.w3.org/2000/svg', 'use');
    use.setAttribute('href', '#icon-star-empty');
    el.appendChild(use);
    row.appendChild(el);
  }
  let sliding = false;
  row.addEventListener('pointerdown', e => {
    if (busy) return;
    sliding = true;
    row.setPointerCapture(e.pointerId);
    applyFromX(e.clientX);
  });
  row.addEventListener('pointermove', e => { if (sliding) applyFromX(e.clientX); });
  row.addEventListener('pointerup',     () => { sliding = false; });
  row.addEventListener('pointercancel', () => { sliding = false; });

  function applyFromX(x) {
    const stars = [...row.querySelectorAll('.star')];
    let picked = 0.5;
    for (const s of stars) {
      const rect = s.getBoundingClientRect();
      const mid  = rect.left + rect.width / 2;
      const n    = parseInt(s.dataset.n);
      if (x >= rect.left) picked = x < mid ? n - 0.5 : n;
    }
    setRating(Math.max(0.5, picked));
  }
})();

function setRating(n) {
  rating = n;
  document.querySelectorAll('.star').forEach(s => {
    const sn = parseInt(s.dataset.n);
    const use = s.querySelector('use');
    if (n >= sn) {
      s.setAttribute('class', 'icon star lit');
      use.setAttribute('href', '#icon-star-fill');
    } else if (n >= sn - 0.5) {
      s.setAttribute('class', 'icon star lit');
      use.setAttribute('href', '#icon-star-half');
    } else {
      s.setAttribute('class', 'icon star');
      use.setAttribute('href', '#icon-star-empty');
    }
  });
  clearTimeout(ratingTimer);
  ratingTimer = setTimeout(submitRating, 1500);
}

function resetRating() {
  clearTimeout(ratingTimer);
  ratingTimer = null;
  rating = 0;
  document.querySelectorAll('.star').forEach(s => {
    s.setAttribute('class', 'icon star');
    s.querySelector('use').setAttribute('href', '#icon-star-empty');
  });
}

async function submitRating() {
  if (!rating || busy) return;
  const item = queue[0];
  if (!item) return;
  const r = rating;
  let ok = true;
  try {
    await fetch(
      `${cfg.url}/:/rate?key=${item.ratingKey}&identifier=com.plexapp.plugins.library&rating=${r * 2}`,
      { method: 'PUT', headers: H() }
    );
  } catch { ok = false; }

  if (ok) {
    ratedCount++;
    updateRatedCounter();
    if (ratedCount % 10 === 0) celebrate(ratedCount);
  } else {
    toast('Failed to save rating');
  }
  advance('right');   // rated → flies RIGHT
}

function doSkip() {
  if (busy) return;
  clearTimeout(ratingTimer);
  toast('Skipped');
  advance('left');    // skipped → flies LEFT
}

// ── Confetti milestone ────────────────────────────────────
function celebrate(n) {
  toast(n + ' Titles Rated!', true);
  if (typeof confetti !== 'function') return;
  // Two colours per side (rather than all four on both) so each burst reads as its own palette.
  const leftColors  = ['#F7C600', '#15A9FC'];
  const rightColors = ['#F74366', '#69DD58'];
  // Bursts fired from the left and right edges, angled inward toward centre.
  confetti({ particleCount: 110, spread: 70, startVelocity: 50, angle: 60,  origin: { x: 0, y: 0.75 }, colors: leftColors });
  confetti({ particleCount: 110, spread: 70, startVelocity: 50, angle: 120, origin: { x: 1, y: 0.75 }, colors: rightColors });
  setTimeout(() => {
    confetti({ particleCount: 80, spread: 90, startVelocity: 40, angle: 60,  origin: { x: 0, y: 0.7 }, colors: leftColors });
    confetti({ particleCount: 80, spread: 90, startVelocity: 40, angle: 120, origin: { x: 1, y: 0.7 }, colors: rightColors });
  }, 200);
}

// ── Advance ───────────────────────────────────────────────
function advance(dir) {
  if (busy) return;
  busy = true;

  const stack = document.getElementById('posterStack');
  const p0 = stack.querySelector('.poster.p0');
  const p1 = stack.querySelector('.poster.p1');
  const p2 = stack.querySelector('.poster.p2');

  if (p0) {
    p0.style.zIndex = 5;
    p0.style.transition = 'transform 0.4s cubic-bezier(0.4,0,0.6,1), opacity 0.4s ease';
    const x = dir === 'left' ? '-130%' : '130%';
    const rot = dir === 'left' ? '-18deg' : '18deg';
    p0.style.transform = `translate(-50%,-50%) translateX(${x}) rotate(${rot})`;
    p0.style.opacity = '0';
  }

  if (p1) { p1.className = 'poster p0'; if (p1._glow) setGlow(p1._glow); }
  if (p2) { p2.className = 'poster p1'; }

  const next = queue[3];
  if (next) {
    const img = document.createElement('img');
    img.className = 'poster p2 skeleton';
    img.alt = next.title || '';
    stack.insertBefore(img, stack.firstChild);
    loadPoster(next, img, false);
  }
  const after = queue[4];
  if (after) { const im = new Image(); im.src = posterUrl(after); }

  if (queue[1]) setInfo(queue[1]);
  resetRating();

  setTimeout(() => {
    if (p0) p0.remove();
    hist.push({ item: queue.shift(), dir });
    if (hist.length > 30) hist.shift();
    document.getElementById('btnBack').disabled = hist.length === 0;
    updateProgress();
    busy = false;
    if (!queue.length) { hideStage(); setState('done'); }
  }, 400);
}

// ── Summary popup ─────────────────────────────────────────
const castPhotoCache = new Map();
async function loadCastPhoto(url, img) {
  const cached = castPhotoCache.get(url);
  if (cached) { img.src = cached; img.classList.remove('skeleton'); return; }
  img.onerror = () => { img.onerror = null; img.classList.remove('skeleton'); img.src = PLACEHOLDER_CAST; };
  img.onload = () => img.classList.remove('skeleton');
  if (!url.startsWith(cfg.url)) { img.src = url; return; }
  try {
    const resp = await fetch(url, { headers: H() });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const blob = await resp.blob();
    const obj = URL.createObjectURL(blob);
    castPhotoCache.set(url, obj);
    img.src = obj;
  } catch (e) {
    console.warn('[cast] photo fetch failed', url, e);
    img.classList.remove('skeleton');
    img.src = PLACEHOLDER_CAST;
  }
}

// Silently warms castPhotoCache (no <img> involved) so by the time the
// summary popup renders the real photo elements, loadCastPhoto hits cache.
async function prefetchCastPhoto(url) {
  if (!url || castPhotoCache.has(url)) return;
  if (!url.startsWith(cfg.url)) {
    // External (e.g. TMDB) CDN photo — just warm the browser's HTTP cache.
    const im = new Image();
    im.src = url;
    return;
  }
  try {
    const resp = await fetch(url, { headers: H() });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const blob = await resp.blob();
    castPhotoCache.set(url, URL.createObjectURL(blob));
  } catch {}
}

async function loadExtraInfo(item) {
  if (item._extra !== undefined) return item._extra;
  try {
    const d = await plexGet(`/library/metadata/${item.ratingKey}`);
    const meta = (d.MediaContainer.Metadata || [])[0];
    const logoImg = (meta && meta.Image || []).find(i => i.type === 'clearLogo');
    const artPath = meta && meta.art;
    item._extra = {
      year: (meta && meta.year) || null,
      backdrop: artPath ? `${cfg.url}${artPath}?X-Plex-Token=${cfg.token}&width=700` : '',
      logo: logoImg && logoImg.url
        ? (/^https?:\/\//.test(logoImg.url) ? logoImg.url : `${cfg.url}${logoImg.url}?X-Plex-Token=${cfg.token}`)
        : '',
      genres: (meta && meta.Genre || []).map(g => g.tag).slice(0, 2),
      cast: (meta && meta.Role || []).slice(0, 6).map(r => ({
        name: r.tag,
        photo: r.thumb
          ? (/^https?:\/\//.test(r.thumb) ? r.thumb : `${cfg.url}${r.thumb}?X-Plex-Token=${cfg.token}`)
          : ''
      }))
    };
  } catch (e) {
    item._extra = { year: null, backdrop: '', logo: '', genres: [], cast: [] };
  }
  return item._extra;
}

let summaryOpener = null;
function openSummary() {
  const item = queue[0];
  if (!item || !item.summary) return;
  summaryOpener = document.activeElement;
  const titleEl = document.getElementById('summaryTitle');
  const box = document.getElementById('summaryBox');
  const backdrop = document.getElementById('summaryBackdrop');
  const backdropImg = document.getElementById('summaryBackdropImg');
  box.classList.remove('has-backdrop');
  backdrop.classList.remove('on');
  backdropImg.removeAttribute('src');
  titleEl.textContent = item.title || '';
  document.getElementById('summaryYear').textContent = '';
  document.getElementById('summaryText').textContent = item.summary;
  const genresEl = document.getElementById('summaryGenres');
  const castWrap = document.getElementById('summaryCastWrap');
  const castEl = document.getElementById('summaryCast');
  const trailerBtn = document.getElementById('btnTrailer');

  // Show skeleton placeholders sized like the real content immediately, so the
  // popup doesn't visibly resize once genres/cast/trailer info arrives.
  genresEl.innerHTML = `
    <span class="genrePill skeleton skel-text" style="width:64px;height:13px;"></span>
    <span class="genrePill skeleton skel-text" style="width:80px;height:13px;"></span>`;
  genresEl.classList.remove('hidden');
  castEl.innerHTML = Array.from({ length: 6 }).map(() => `
    <div class="castMember">
      <div class="castPhoto skeleton"></div>
      <div class="castName skel-text skeleton" style="width:100%;height:11px;margin-top:6px;"></div>
    </div>`).join('');
  castEl.onscroll = null;
  castEl.scrollLeft = 0;
  castWrap.classList.remove('hidden');
  document.getElementById('castFadeL').classList.remove('show');
  document.getElementById('castFadeR').classList.remove('show');

  // Reset trailer state for this item; show a skeleton until we know if one exists.
  stopInlineTrailer();
  trailerBtn.classList.remove('hidden');
  trailerBtn.classList.add('skeleton');
  trailerBtn.innerHTML = '';
  loadTrailer(item).then(trailer => {
    if (queue[0] !== item) return;
    trailerBtn.classList.remove('skeleton');
    if (trailer && trailer.url) {
      trailerBtn.innerHTML = '<svg class="icon" aria-hidden="true" focusable="false"><use href="#icon-movies"/></svg> Trailer';
    } else {
      trailerBtn.classList.add('hidden');
    }
  });

  // Hide any lingering toast so it can't sit on top of the popup.
  document.getElementById('toast').classList.remove('on');
  document.getElementById('summaryOverlay').classList.add('on');
  document.getElementById('summaryClose').focus();
  loadExtraInfo(item).then(extra => {
    if (queue[0] !== item) return;
    document.getElementById('summaryYear').textContent = extra.year || '';

    // Backdrop + logo go together: no backdrop means we keep the plain
    // text-title layout untouched, even if a logo happens to be available.
    if (extra.backdrop) {
      backdropImg.onload = () => {
        if (queue[0] !== item) return;
        box.classList.add('has-backdrop');
        requestAnimationFrame(() => backdrop.classList.add('on'));
      };
      backdropImg.onerror = () => {
        backdropImg.onerror = null;
        box.classList.remove('has-backdrop');
        backdrop.classList.remove('on');
      };
      backdropImg.src = extra.backdrop;

      if (extra.logo) {
        const logoImg = new Image();
        logoImg.alt = item.title || '';
        logoImg.onload = () => {
          if (queue[0] !== item) return;
          titleEl.innerHTML = '';
          titleEl.appendChild(logoImg);
        };
        logoImg.onerror = () => { titleEl.textContent = item.title || ''; };
        logoImg.src = extra.logo;
      }
    }

    if (extra.genres.length) {
      genresEl.innerHTML = extra.genres.map(g => `<span class="genrePill">${escHtml(g)}</span>`).join('');
    } else {
      genresEl.classList.add('hidden');
    }
    if (extra.cast.length) {
      castEl.innerHTML = extra.cast.map(c => `
        <div class="castMember">
          <img class="castPhoto skeleton" loading="lazy" alt="${escHtml(c.name)}">
          <span class="castName">${escHtml(c.name)}</span>
        </div>`).join('');
      const imgs = castEl.querySelectorAll('.castPhoto');
      extra.cast.forEach((c, i) => { if (c.photo) loadCastPhoto(c.photo, imgs[i]); });
      castEl.onscroll = updateCastFades;
      requestAnimationFrame(updateCastFades);
    } else {
      castWrap.classList.add('hidden');
    }
  });
}
function updateCastFades() {
  const el = document.getElementById('summaryCast');
  const fadeL = document.getElementById('castFadeL');
  const fadeR = document.getElementById('castFadeR');
  fadeL.classList.toggle('show', el.scrollLeft > 2);
  fadeR.classList.toggle('show', el.scrollLeft < el.scrollWidth - el.clientWidth - 2);
}
function closeSummary() {
  document.getElementById('summaryOverlay').classList.remove('on');
  stopInlineTrailer();
  if (summaryOpener && summaryOpener.focus) summaryOpener.focus();
  summaryOpener = null;
}
function closeSummaryFromOverlay(e) {
  if (e.target === document.getElementById('summaryOverlay')) closeSummary();
}

function goBack() {
  if (!hist.length || busy) return;
  busy = true;
  clearTimeout(ratingTimer);

  const { item, dir } = hist.pop();
  queue.unshift(item);

  const stack = document.getElementById('posterStack');
  const p0 = stack.querySelector('.poster.p0');
  const p1 = stack.querySelector('.poster.p1');
  const p2 = stack.querySelector('.poster.p2');

  if (p2) p2.remove();
  if (p1) p1.className = 'poster p2';
  if (p0) p0.className = 'poster p1';

  // Returning poster re-enters from the side it originally exited toward
  const img = document.createElement('img');
  img.className = 'poster p0 skeleton';
  img.alt = item.title || '';
  img.style.transition = 'none';
  img.style.zIndex = 5;
  const x = dir === 'left' ? '-130%' : '130%';
  const rot = dir === 'left' ? '-18deg' : '18deg';
  img.style.transform = `translate(-50%,-50%) translateX(${x}) rotate(${rot})`;
  img.style.opacity = '0';
  stack.appendChild(img);
  loadPoster(item, img, true);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      img.style.transition = 'transform 0.4s cubic-bezier(0.4,0,0.6,1), opacity 0.4s ease';
      img.style.transform = 'translate(-50%,-50%) scale(1)';
      img.style.opacity = '1';
    });
  });

  setInfo(item);
  resetRating();
  document.getElementById('btnBack').disabled = hist.length === 0;
  updateProgress();
  preloadAhead();

  setTimeout(() => {
    img.removeAttribute('style');
    img.className = 'poster p0';
    busy = false;
  }, 420);
}

// ── Shuffle ───────────────────────────────────────────────
function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function toggleShuffle() {
  if (busy || queue.length < 2) return;
  clearTimeout(ratingTimer);
  shuffled = !shuffled;
  const shuffleBtn = document.getElementById('btnShuffle');
  shuffleBtn.classList.toggle('active', shuffled);
  shuffleBtn.setAttribute('aria-pressed', String(shuffled));

  const [current, ...rest] = queue;
  let reordered;
  if (shuffled) {
    reordered = shuffleArray(rest);
  } else {
    const restKeys = new Set(rest.map(it => it.ratingKey));
    reordered = chronological.filter(it => restKeys.has(it.ratingKey));
  }
  queue = [current, ...reordered];
  rebuild();
  toast(shuffled ? 'Shuffle on' : 'Shuffle off');
}

// ── UI helpers ────────────────────────────────────────────
function setState(s) {
  document.getElementById('stAuth').classList.toggle('on', s === 'auth');
  document.getElementById('stLoad').classList.toggle('on', s === 'load');
  document.getElementById('stErr').classList.toggle('on',  s === 'err');
  document.getElementById('stDone').classList.toggle('on', s === 'done');
}
function showStage() {
  document.getElementById('stage').classList.add('on');
  document.getElementById('progress').classList.add('on');
  document.getElementById('typeFilter').classList.add('on');
  ['stAuth','stLoad','stErr','stDone'].forEach(id => document.getElementById(id).classList.remove('on'));
}
function hideStage() {
  document.getElementById('stage').classList.remove('on');
  document.getElementById('progress').classList.remove('on');
  document.getElementById('typeFilter').classList.remove('on');
}

const RING_CIRC = 2 * Math.PI * 15.5;
function updateProgress() {
  const total = chronological.length;
  const remaining = Math.max(total - ratedCount, 0);
  const frac = total ? ratedCount / total : 0;
  const bar = document.querySelector('#progress .ring-bar');
  bar.style.strokeDasharray = RING_CIRC;
  bar.style.strokeDashoffset = RING_CIRC * (1 - frac);
  document.getElementById('progressCount').textContent = remaining;
}

function fmtDate(ms) {
  const d = new Date(ms), diff = (Date.now() - ms) / 86400000;
  if (diff < 1)  return 'today';
  if (diff < 2)  return 'yesterday';
  if (diff < 7)  return Math.floor(diff) + 'd ago';
  if (diff < 30) return Math.floor(diff/7) + 'w ago';
  return d.toLocaleDateString('en-US', { month:'short', year:'numeric' });
}

function toast(msg, isCelebrate) {
  const t = document.getElementById('toast');
  // Float just above the poster stack, in the open space below the
  // counters/filters, so it never overlaps the poster, title, stars or actions.
  const stackRect = document.getElementById('posterStack').getBoundingClientRect();
  if (stackRect.height) {
    t.style.top = (stackRect.top - 46) + 'px';
    t.style.bottom = 'auto';
  }
  t.textContent = msg;
  t.classList.toggle('celebrate', !!isCelebrate);
  t.classList.add('on');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('on'), isCelebrate ? 2600 : 1600);
}

// iOS webapp hardening: block pinch/double-tap zoom & rubber-banding
['gesturestart','gesturechange','gestureend'].forEach(ev =>
  document.addEventListener(ev, e => e.preventDefault())
);
let lastTouch = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTouch <= 300) e.preventDefault();
  lastTouch = now;
}, { passive: false });
document.addEventListener('touchmove', e => {
  if (e.scale && e.scale !== 1) e.preventDefault();
}, { passive: false });

document.addEventListener('keydown', e => {
  const summaryOpen = document.getElementById('summaryOverlay').classList.contains('on');
  if (e.key === 'Escape' && summaryOpen) {
    closeSummary();
    return;
  }
  if (summaryOpen || busy || !queue[0]) return;

  // Number keys rate in whole stars; hold Shift for the half-star below
  // (e.g. "3" = 3 stars, Shift+"3" = 2.5 stars) — mirrors the star slider's granularity.
  if (e.key >= '1' && e.key <= '5') {
    e.preventDefault();
    const n = parseInt(e.key, 10);
    setRating(e.shiftKey ? n - 0.5 : n);
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    goBack();
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    doSkip();
  }
});

// ── Boot ──────────────────────────────────────────────────
if (cfg.token && cfg.url) {
  loadItems();
} else {
  setState('auth');
}
</script>
